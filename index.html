<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning de Révisions — Concours 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --parchment: #F2EDE4;
    --sand: #E8E0D0;
    --tan: #D4C5AE;
    --caramel: #C4A882;
    --brown-light: #9B7B55;
    --brown: #7A5C38;
    --brown-dark: #5A3E22;
    --espresso: #3B2A18;
    --ink: #2C1E0F;
    --green-soft: #D4DFCA;
    --green: #6A8B5A;
    --blue-soft: #CAD4DF;
    --blue: #4A6B8A;
    --purple-soft: #D8CADF;
    --purple: #7A5A8A;
    --red-soft: #DFCACA;
    --red: #8A4A4A;
    --gold: #C49A3C;
    --white: #FFFFFF;
    --shadow: rgba(58, 42, 24, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Instrument Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--espresso);
    padding: 2rem 2.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--caramel);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--parchment);
    letter-spacing: 0.02em;
  }
  header p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--caramel);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 2rem;
    margin-top: 1rem;
  }
  .stat {
    display: flex;
    flex-direction: column;
  }
  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--caramel);
    line-height: 1;
  }
  .stat-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--tan);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* ── LAYOUT ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ── VUE GLOBALE ── */
  #vue-globale { margin-bottom: 2.5rem; }
  .vue-titre {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--brown-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .grid-semaines {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  .semaine-bloc {
    background: var(--white);
    border: 1px solid var(--sand);
    border-radius: 12px;
    overflow: hidden;
  }
  .semaine-header {
    background: var(--espresso);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .semaine-header span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--parchment);
  }
  .semaine-header small {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--caramel);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .jours-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
  }
  .jour-mini {
    padding: 0.6rem 0.4rem;
    border-right: 1px solid var(--sand);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .jour-mini:last-child { border-right: none; }
  .jour-mini:hover { background: var(--parchment); }
  .jour-mini.active { background: var(--espresso); }
  .jour-mini.active .jm-label { color: var(--caramel); }
  .jour-mini.active .jm-date { color: var(--parchment); }
  .jour-mini.weekend { background: var(--parchment); opacity: 0.7; }
  .jour-mini.weekend:hover { opacity: 1; }
  .jm-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--brown-light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    text-align: center;
  }
  .jm-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--espresso);
    display: block;
    text-align: center;
    line-height: 1.2;
  }
  .jm-progress {
    margin-top: 4px;
    height: 3px;
    background: var(--sand);
    border-radius: 2px;
    overflow: hidden;
  }
  .jm-bar {
    height: 100%;
    background: var(--caramel);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .jm-check {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: none;
  }
  .jour-mini.complet .jm-check { display: block; }

  /* ── DETAIL JOUR ── */
  #detail-jour {
    display: none;
    animation: fadeIn 0.2s ease;
  }
  #detail-jour.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--sand);
  }
  .detail-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--espresso);
    line-height: 1;
  }
  .detail-date span {
    display: block;
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
    color: var(--brown-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 400;
  }
  .detail-meta {
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-hours { background: var(--espresso); color: var(--caramel); }
  .badge-week { background: var(--parchment); color: var(--brown); border: 1px solid var(--tan); }

  .close-btn {
    background: none;
    border: 1px solid var(--tan);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--brown-light);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .close-btn:hover { background: var(--parchment); color: var(--espresso); }

  /* ── BLOCS DE TÂCHES ── */
  .planning-line {
    background: var(--white);
    border: 1px solid var(--sand);
    border-radius: 10px;
    margin-bottom: 0.6rem;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .planning-line:hover { box-shadow: 0 2px 12px var(--shadow); }
  .planning-line.done { opacity: 0.55; }
  .planning-line.done .tache-name { text-decoration: line-through; color: var(--brown-light); }

  .tache-main {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem 1rem;
    cursor: pointer;
    user-select: none;
  }
  .tache-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--tan);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    cursor: pointer;
  }
  .tache-check:hover { border-color: var(--caramel); background: var(--parchment); }
  .done .tache-check {
    background: var(--green);
    border-color: var(--green);
  }
  .tache-check svg { display: none; }
  .done .tache-check svg { display: block; }

  .tache-color {
    width: 4px;
    height: 36px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .tache-info { flex: 1; }
  .tache-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--espresso);
    line-height: 1.3;
  }
  .tache-sous {
    font-size: 0.75rem;
    color: var(--brown-light);
    margin-top: 2px;
  }
  .tache-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }
  .tache-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--brown-light);
    letter-spacing: 0.03em;
  }
  .tache-dur {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--caramel);
    background: var(--parchment);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .expand-btn {
    background: none;
    border: none;
    color: var(--tan);
    cursor: pointer;
    padding: 4px;
    font-size: 0.7rem;
    transition: color 0.15s;
  }
  .expand-btn:hover { color: var(--brown); }

  /* ── DÉTAIL EXPANDABLE ── */
  .tache-detail {
    display: none;
    padding: 0 1rem 0.8rem 3.4rem;
    border-top: 1px solid var(--sand);
  }
  .tache-detail.open { display: block; }
  .detail-list { list-style: none; padding-top: 0.6rem; }
  .detail-list li {
    font-size: 0.8rem;
    color: var(--brown-dark);
    padding: 3px 0;
    padding-left: 1rem;
    position: relative;
    line-height: 1.5;
  }
  .detail-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--caramel);
    font-size: 0.7rem;
  }
  .detail-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--blue);
    text-decoration: none;
    letter-spacing: 0.04em;
    border: 1px solid var(--blue-soft);
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--blue-soft);
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .detail-link:hover { opacity: 1; }

  /* ── SÉPARATEURS ── */
  .sep {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 0.8rem 0 0.5rem;
  }
  .sep-line { flex: 1; height: 1px; background: var(--sand); }
  .sep-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--tan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* ── COLORS par matière ── */
  .c-esh { background: var(--caramel); }
  .c-maths { background: var(--green); }
  .c-anglais { background: var(--blue); }
  .c-italien { background: var(--blue); }
  .c-philo { background: var(--purple); }
  .c-anki { background: var(--gold); }
  .c-pause { background: var(--tan); }

  /* ── PROGRESS BAR JOUR ── */
  .jour-progress-wrap {
    background: var(--parchment);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .jour-progress-bar {
    flex: 1;
    height: 6px;
    background: var(--sand);
    border-radius: 3px;
    overflow: hidden;
  }
  .jour-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--caramel), var(--brown-light));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .jour-progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--brown-light);
    min-width: 30px;
    text-align: right;
  }
  .jour-progress-txt {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--tan);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── NOTE / SPECIAL ── */
  .note-special {
    background: var(--parchment);
    border-left: 3px solid var(--caramel);
    border-radius: 0 8px 8px 0;
    padding: 0.7rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.8rem;
    color: var(--brown-dark);
    font-style: italic;
  }

  /* ── SECTION RETARD ── */
  .retard-section {
    margin-top: 1.5rem;
    border: 1.5px dashed var(--tan);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    background: var(--white);
  }
  .retard-titre {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--brown-light);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .retard-titre::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .retard-taches-list { margin-bottom: 0.8rem; }
  .retard-tache-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--sand);
    font-size: 0.8rem;
    color: var(--brown-dark);
  }
  .retard-tache-item:last-child { border-bottom: none; }
  .retard-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--red);
    border-radius: 3px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .retard-check:hover { background: var(--red-soft); }
  .retard-check.reported { background: var(--red); border-color: var(--red); }
  .retard-check.reported svg { display: block; }
  .retard-check svg { display: none; }
  .retard-note-wrap { margin-top: 0.6rem; }
  .retard-note-wrap label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--tan);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 4px;
  }
  .retard-textarea {
    width: 100%;
    min-height: 60px;
    background: var(--parchment);
    border: 1px solid var(--sand);
    border-radius: 7px;
    padding: 0.5rem 0.7rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--espresso);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .retard-textarea:focus { border-color: var(--caramel); }
  .retard-textarea::placeholder { color: var(--tan); font-style: italic; }
  .retard-save-btn {
    margin-top: 0.5rem;
    background: none;
    border: 1px solid var(--caramel);
    border-radius: 6px;
    padding: 5px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--brown);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .retard-save-btn:hover { background: var(--parchment); color: var(--espresso); }

  /* ── BANDEAU REPORT (affiché sur le jour suivant) ── */
  .report-bandeau {
    background: #FFF6F0;
    border: 1.5px solid var(--red-soft);
    border-left: 4px solid var(--red);
    border-radius: 0 8px 8px 0;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
  }
  .report-bandeau-titre {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }
  .report-item {
    font-size: 0.8rem;
    color: var(--brown-dark);
    padding: 2px 0;
    padding-left: 0.8rem;
    position: relative;
  }
  .report-item::before { content: '↳'; position: absolute; left: 0; color: var(--red); font-size: 0.7rem; }
  .report-note-txt {
    font-size: 0.78rem;
    color: var(--brown);
    font-style: italic;
    margin-top: 0.4rem;
    padding-left: 0.8rem;
    border-left: 2px solid var(--red-soft);
  }

  /* ── INDICATEUR mini sur accueil ── */
  .jm-retard {
    display: none;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    position: absolute;
    top: 4px; left: 4px;
  }
  .jour-mini.has-retard .jm-retard { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    .grid-semaines { grid-template-columns: 1fr; }
    header { padding: 1.2rem 1rem 1rem; }
    .header-stats { gap: 1.2rem; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Planning de Révisions — Concours 2026</h1>
  <p>6 avril → 20 avril · ESH · Maths · Anglais · Italien · Philosophie · Anki</p>
  <div class="header-stats">
    <div class="stat">
      <span class="stat-val" id="stat-total">0</span>
      <span class="stat-lbl">Tâches complètes</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-pct">0%</span>
      <span class="stat-lbl">Avancement global</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-jours">0</span>
      <span class="stat-lbl">Jours restants</span>
    </div>
  </div>
</header>

<div class="container">
  <!-- VUE GLOBALE -->
  <div id="vue-globale">
    <div class="vue-titre">Vue d'ensemble des vacances</div>
    <div class="grid-semaines">
      <div class="semaine-bloc">
        <div class="semaine-header">
          <span>Semaine 1</span>
          <small>6 → 12 avril</small>
        </div>
        <div class="jours-grid" id="grid-s1"></div>
      </div>
      <div class="semaine-bloc">
        <div class="semaine-header">
          <span>Semaine 2</span>
          <small>13 → 20 avril</small>
        </div>
        <div class="jours-grid" id="grid-s2"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL JOUR -->
  <div id="detail-jour">
    <div class="detail-header">
      <div>
        <div class="detail-date" id="detail-titre">Dimanche 6 avril</div>
        <div style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;" id="detail-badges"></div>
      </div>
      <button class="close-btn" onclick="fermerDetail()">✕ Fermer</button>
    </div>
    <div id="detail-note"></div>
    <div class="jour-progress-wrap">
      <span class="jour-progress-txt">Progression du jour</span>
      <div class="jour-progress-bar"><div class="jour-progress-fill" id="jour-progress-fill" style="width:0%"></div></div>
      <span class="jour-progress-pct" id="jour-progress-pct">0%</span>
    </div>
    <div id="detail-taches"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════════════

const CHAPITRES_ESH = [
  { id: 'esh1', label: 'HPE + Chap. 1', detail: ['Histoire de la pensée économique', 'Problématiques macro : consommation, épargne, État', 'Fondements de la macroéconomie'], jours: 1 },
  { id: 'esh2a', label: 'CPP + Défaillances du marché + Concurrence imparfaite', detail: ['Concurrence pure et parfaite', 'Défaillances de marché (externalités, biens publics)', 'Monopole, oligopole, concurrence monopolistique'], jours: 1 },
  { id: 'esh2b', label: 'Concentration + Gouvernance + Sociologies', detail: ['Concentration des entreprises et gouvernance', 'Sociologie des organisations', 'Sociologie du travail', 'Politique de la concurrence'], jours: 1 },
  { id: 'esh3', label: 'Système productif + Politiques industrielle, concurrence, fiscale', detail: ['Transformation du système productif', 'Politique industrielle (chap. 12)', 'Politique de la concurrence (chap. 12)', 'Politique fiscale (chap. 12)'], jours: 1 },
  { id: 'esh4a', label: 'Croissance économique + Économie du développement + Dette publique', detail: ['Théories et modèles de la croissance', 'Économie du développement (IDH, convergence)', 'La question de la dette publique'], jours: 1 },
  { id: 'esh4b', label: 'Mondialisation (1/2)', detail: ['Commerce international : théories classiques et nouvelles', 'Flux de capitaux et investissements directs étrangers', 'Firmes multinationales'], jours: 1 },

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = {};
const STORAGE_KEY = 'planning_revision_2026';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    state = saved ? JSON.parse(saved) : {};
  } catch(e) { state = {}; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function isChecked(id) { return !!state[id]; }
function toggleCheck(id) {
  state[id] = !state[id];
  saveState();
  updateAll();
}

// ── RETARD STATE ──
const RETARD_KEY = 'planning_retard_2026';
let retardState = {};

function loadRetard() {
  try {
    const saved = localStorage.getItem(RETARD_KEY);
    retardState = saved ? JSON.parse(saved) : {};
  } catch(e) { retardState = {}; }
}
function saveRetard() {
  try { localStorage.setItem(RETARD_KEY, JSON.stringify(retardState)); } catch(e) {}
}
function getRetard(jourId) {
  return retardState[jourId] || { taches: [], note: '' };
}
function toggleRetardTache(jourId, tacheId) {
  if (!retardState[jourId]) retardState[jourId] = { taches: [], note: '' };
  const arr = retardState[jourId].taches;
  const idx = arr.indexOf(tacheId);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(tacheId);
  saveRetard();
  // Update UI
  const btn = document.getElementById('rcheck-' + tacheId);
  if (btn) btn.classList.toggle('reported', arr.includes(tacheId));
  buildGrids();
}
function saveRetardNote(jourId) {
  if (!retardState[jourId]) retardState[jourId] = { taches: [], note: '' };
  const ta = document.getElementById('retard-note-' + jourId);
  if (ta) retardState[jourId].note = ta.value;
  saveRetard();
  buildGrids();
  // Visual feedback
  const btn = document.querySelector(`[onclick="saveRetardNote('${jourId}')"]`);
  if (btn) { btn.textContent = '✓ Enregistré'; setTimeout(() => { btn.textContent = 'Enregistrer la note'; }, 1500); }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
const JOURS_NOM = ['Dim.','Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.'];

function buildGrids() {
  const s1 = document.getElementById('grid-s1');
  const s2 = document.getElementById('grid-s2');
  s1.innerHTML = '';
  s2.innerHTML = '';

  JOURS.forEach((j, idx) => {
    const el = document.createElement('div');
    el.className = 'jour-mini' + (j.weekend ? ' weekend' : '');
    el.id = 'mini-' + j.id;
    el.onclick = () => ouvrirDetail(j.id);

    const tachesActives = j.taches.filter(t => t.mat !== 'pause');
    const done = tachesActives.filter(t => isChecked(t.id)).length;
    const pct = tachesActives.length > 0 ? Math.round(done / tachesActives.length * 100) : 0;

    const shortDay = j.jour.substring(0, 3).toLowerCase();
    const dayMap = {'dim':'Dim.','lun':'Lun.','mar':'Mar.','mer':'Mer.','jeu':'Jeu.','ven':'Ven.','sam':'Sam.'};

    const retardData = getRetard(j.id);
    const hasRetard = (retardData.taches && retardData.taches.length > 0) || retardData.note;

    el.innerHTML = `
      <div class="jm-retard"></div>
      <span class="jm-label">${dayMap[shortDay] || j.jour.substring(0,3)}</span>
      <span class="jm-date">${j.date}</span>
      <div class="jm-progress"><div class="jm-bar" style="width:${pct}%"></div></div>
      <div class="jm-check"></div>
    `;
    if (pct === 100) el.classList.add('complet');
    if (hasRetard) el.classList.add('has-retard');

    (j.semaine === 1 ? s1 : s2).appendChild(el);
  });
}

let currentJourId = null;

function ouvrirDetail(jourId) {
  const j = JOURS.find(x => x.id === jourId);
  if (!j) return;
  currentJourId = jourId;

  // Mark active
  document.querySelectorAll('.jour-mini').forEach(el => el.classList.remove('active'));
  const mini = document.getElementById('mini-' + jourId);
  if (mini) mini.classList.add('active');

  // Titre
  document.getElementById('detail-titre').innerHTML = `${j.jour} ${j.date} ${j.mois}`;

  // Badges
  const badges = document.getElementById('detail-badges');
  const semLabel = j.semaine === 1 ? 'Semaine 1' : 'Semaine 2';
  const heureDebut = j.semaine === 1 ? '8h00' : '9h00';
  badges.innerHTML = `<span class="badge badge-week">${semLabel}</span><span class="badge badge-hours">Début ${heureDebut}</span>`;

  // Note spéciale
  const noteEl = document.getElementById('detail-note');
  let noteHTML = '';
  if (j.note) noteHTML += `<div class="note-special">${j.note}</div>`;

  // Bandeau report du jour précédent
  const jIdx = JOURS.findIndex(x => x.id === jourId);
  if (jIdx > 0) {
    const prevJ = JOURS[jIdx - 1];
    const prevRetard = getRetard(prevJ.id);
    const prevTaches = (prevRetard.taches || []);
    const prevNote = prevRetard.note || '';
    if (prevTaches.length > 0 || prevNote) {
      noteHTML += `<div class="report-bandeau">
        <div class="report-bandeau-titre">↩ À rattraper depuis ${prevJ.jour} ${prevJ.date} ${prevJ.mois}</div>
        ${prevTaches.map(tid => {
          const t = prevJ.taches.find(x => x.id === tid);
          return t ? `<div class="report-item">${t.name}${t.sous ? ' <span style="color:var(--brown-light);font-size:0.72rem;">— ' + t.sous + '</span>' : ''}</div>` : '';
        }).join('')}
        ${prevNote ? `<div class="report-note-txt">${prevNote}</div>` : ''}
      </div>`;
    }
  }
  noteEl.innerHTML = noteHTML;

  // Tâches
  const container = document.getElementById('detail-taches');
  container.innerHTML = '';

  let lastMat = null;
  j.taches.forEach((t, ti) => {
    // Séparateur si changement de bloc
    if (t.mat !== lastMat && t.mat !== 'pause') {
      if (lastMat !== null && lastMat !== 'pause') {
        const sep = document.createElement('div');
        sep.className = 'sep';
        sep.innerHTML = `<div class="sep-line"></div><span class="sep-label">${t.mat}</span><div class="sep-line"></div>`;
        container.appendChild(sep);
      }
    }
    lastMat = t.mat;

    const checked = isChecked(t.id);
    const isPause = t.mat === 'pause';
    const hasDetail = t.detail && t.detail.length > 0;

    const line = document.createElement('div');
    line.className = 'planning-line' + (checked && !isPause ? ' done' : '') + (isPause ? ' pause-line' : '');
    line.id = 'line-' + t.id;

    if (isPause) {
      line.style.cssText = 'background:var(--parchment);border-color:var(--sand);opacity:0.7;';
      line.innerHTML = `
        <div class="tache-main" style="cursor:default;">
          <div class="tache-color ${t.color}" style="opacity:0.5;"></div>
          <div class="tache-info">
            <div class="tache-name" style="color:var(--brown-light);font-size:0.8rem;">${t.name}</div>
            ${t.sous ? `<div class="tache-sous">${t.sous}</div>` : ''}
          </div>
          <div class="tache-right">
            <span class="tache-time">${t.time}</span>
            <span class="tache-dur">${t.dur}</span>
          </div>
        </div>`;
    } else {
      line.innerHTML = `
        <div class="tache-main">
          <div class="tache-check" onclick="event.stopPropagation();toggleCheck('${t.id}')">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="tache-color ${t.color}"></div>
          <div class="tache-info">
            <div class="tache-name">${t.name}</div>
            ${t.sous ? `<div class="tache-sous">${t.sous}</div>` : ''}
          </div>
          <div class="tache-right">
            <span class="tache-time">${t.time}</span>
            <span class="tache-dur">${t.dur}</span>
            ${hasDetail ? `<button class="expand-btn" onclick="toggleDetail('detail-${t.id}')" title="Voir détails">▾</button>` : ''}
          </div>
        </div>
        ${hasDetail ? `
        <div class="tache-detail" id="detail-${t.id}">
          <ul class="detail-list">
            ${t.detail.map(d => `<li>${d}</li>`).join('')}
          </ul>
          ${t.link ? `<a href="${t.link}" target="_blank" class="detail-link">↗ Accéder aux ressources</a>` : ''}
        </div>` : ''}`;
    }

    container.appendChild(line);
  });

  // ── SECTION RETARD ──
  const retardData = getRetard(j.id);
  const retardSection = document.createElement('div');
  retardSection.className = 'retard-section';
  retardSection.id = 'retard-section-' + j.id;

  const tachesNonFaites = j.taches.filter(t => t.mat !== 'pause' && !isChecked(t.id));
  const currentReported = retardData.taches || [];
  const currentNote = retardData.note || '';

  retardSection.innerHTML = `
    <div class="retard-titre">Ce que je n'ai pas eu le temps de faire</div>
    ${tachesNonFaites.length > 0 ? `
    <div class="retard-taches-list">
      ${tachesNonFaites.map(t => `
        <div class="retard-tache-item">
          <div class="retard-check ${currentReported.includes(t.id) ? 'reported' : ''}" id="rcheck-${t.id}" onclick="toggleRetardTache('${j.id}','${t.id}')">
            <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
              <path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>${t.name}${t.sous ? ' <span style="color:var(--brown-light);font-size:0.72rem;">— ' + t.sous + '</span>' : ''}</span>
        </div>`).join('')}
    </div>` : `<div style="font-size:0.75rem;color:var(--green);margin-bottom:0.6rem;">✓ Tout est fait !</div>`}
    <div class="retard-note-wrap">
      <label>Note libre</label>
      <textarea class="retard-textarea" id="retard-note-${j.id}" placeholder="Ex : je n'ai pas fini le chapitre IS-LM, à reprendre demain matin…">${currentNote}</textarea>
    </div>
    <button class="retard-save-btn" onclick="saveRetardNote('${j.id}')">Enregistrer la note</button>
  `;
  container.appendChild(retardSection);

  // Afficher
  const detailEl = document.getElementById('detail-jour');
  detailEl.classList.add('visible');
  detailEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  updateJourProgress(j);
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function fermerDetail() {
  document.getElementById('detail-jour').classList.remove('visible');
  document.querySelectorAll('.jour-mini').forEach(el => el.classList.remove('active'));
  currentJourId = null;
}

function updateJourProgress(j) {
  const tachesActives = j.taches.filter(t => t.mat !== 'pause');
  const done = tachesActives.filter(t => isChecked(t.id)).length;
  const pct = tachesActives.length > 0 ? Math.round(done / tachesActives.length * 100) : 0;
  document.getElementById('jour-progress-fill').style.width = pct + '%';
  document.getElementById('jour-progress-pct').textContent = pct + '%';
}

function updateAll() {
  // Recalc global stats
  let totalTaches = 0, totalDone = 0;
  JOURS.forEach(j => {
    j.taches.filter(t => t.mat !== 'pause').forEach(t => {
      totalTaches++;
      if (isChecked(t.id)) totalDone++;
    });
  });

  document.getElementById('stat-total').textContent = totalDone;
  document.getElementById('stat-pct').textContent = Math.round(totalDone / totalTaches * 100) + '%';

  // Jours restants
  const today = new Date();
  const fin = new Date(2026, 3, 20); // 20 avril 2026
  const diff = Math.max(0, Math.ceil((fin - today) / 86400000));
  document.getElementById('stat-jours').textContent = diff;

  // Rebuild grids
  buildGrids();

  // Refresh detail if open
  if (currentJourId) {
    const j = JOURS.find(x => x.id === currentJourId);
    if (j) {
      // Update check states
      j.taches.filter(t => t.mat !== 'pause').forEach(t => {
        const line = document.getElementById('line-' + t.id);
        if (line) {
          if (isChecked(t.id)) line.classList.add('done');
          else line.classList.remove('done');
          const check = line.querySelector('.tache-check');
          if (check) {
            check.style.background = isChecked(t.id) ? 'var(--green)' : '';
            check.style.borderColor = isChecked(t.id) ? 'var(--green)' : '';
          }
        }
      });
      updateJourProgress(j);
    }
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadState();
loadRetard();
buildGrids();
updateAll();

// Auto-ouvrir aujourd'hui si dans la période
const now = new Date();
const nowDate = now.getDate();
const nowMonth = now.getMonth(); // 3 = avril
if (nowMonth === 3) {
  const todayJour = JOURS.find(j => j.date === nowDate);
  if (todayJour) {
    setTimeout(() => ouvrirDetail(todayJour.id), 300);
  }
}
</script>
</body>
</html>
